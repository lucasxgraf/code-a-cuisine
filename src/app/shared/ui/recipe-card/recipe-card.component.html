<article class="recipe-card">
  <header class="recipe-card__header">
    <span class="recipe-card__badge">
      <img src="assets/svg/serving_plate.svg" alt="Serving plate">
      Recipe {{ recipeNumber() }}
    </span>
  </header>

  <h3 class="recipe-card__title">{{ title() }}</h3>

  <div class="recipe-card__meta">
    <span class="recipe-card__time">
      <img src="assets/svg/schedule.svg" alt="Schedule">
      Cooking time: {{ cookingTime() }} min
    </span>
  </div>

  <footer class="recipe-card__actions">
    <app-button colorScheme="creme" (click)="viewDetails.emit()">
      View
    </app-button>
  </footer>
</article>
