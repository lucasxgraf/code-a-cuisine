<div class="preferences container">
  <h1 class="preferences__title">Choose your preferences</h1>

  <div class="preferences__counters">
    <app-counter 
      label="How many portions you need?"
      unit="Portion"
      [min]="1" 
      [max]="12"
      [value]="service.preferences().portions"
      (changed)="updateCount('portions', $event)" 
    />

    <app-counter 
      label="How many are cooking?"
      unit="Person"
      [min]="1" 
      [max]="3"
      [value]="service.preferences().people"
      (changed)="updateCount('people', $event)"
    />
  </div>

  <section class="preferences__card">

      [options]="times"

      label="Diet preferences:"
      [options]="diets"
      [activeOption]="service.preferences().diet"
      (select)="updatePref('diet', $event)"
    >

  </section>

  <footer class="preferences__footer">
    <app-button 
      colorScheme="green" 
      (click)="generateRecipe()"
    >
      Generate a recipe
    </app-button>
  </footer>
</div>
