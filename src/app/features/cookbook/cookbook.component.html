<div class="cookbook container">
  <header class="cookbook__header">
    <div class="cookbook__intro">
      <h1 class="cookbook__title">Cookbook</h1>
      <p class="cookbook__description">
        From quick bites to gourmet delights, explore them all in our ultimate cookbook and get inspired for your next
        culinary adventure.
      </p>
    </div>

    <div class="cookbook__most-liked">
      <div class="cookbook__most-liked__header">
        <h2 class="cookbook__most-liked__title">Most liked recipes</h2>
        <img src="assets/svg/heart_default.svg" alt="heart icon">
      </div>

      <div class="cookbook__most-liked__list">
        @for (recipe of featuredRecipes(); track recipe.title) {
        <app-most-liked-card 
          [title]="recipe.title" 
          [cookingTime]="recipe.cooking_time + ' min'" 
          [likes]="recipe.displayLikes" 
          [isLiked]="recipe.isLiked"
          (toggleLike)="onToggleLike(recipe.id)"
          (cardClick)="navigateToRecipe(recipe.id)"
        />
        }
      </div>
    </div>
  </header>

  <section class="cookbook__grid">
    @for (cuisine of cuisines(); track cuisine.id) {
      <app-cuisine-card
        [name]="cuisine.name"
        [imageUrl]="cuisine.image"
        [routerLink]="['/cuisine', cuisine.slug]"
      />
    }
  </section>

  <footer class="cookbook__footer">
    <app-button variant="secondary" colorScheme="green" routerLink="/generate-input-user">
      Generate new recipe
    </app-button>
  </footer>
</div>
